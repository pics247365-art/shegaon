<!doctype html> 
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>שגאון</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:#050507;
  color:#f3eee4;
  font-family:Arial,sans-serif;
}
.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:30px;
  background:
    radial-gradient(circle at 20% 20%,rgba(142,191,255,.22),transparent 30%),
    radial-gradient(circle at 80% 70%,rgba(165,22,28,.28),transparent 32%),
    #050507;
}
h1{
  font-size:23vw;
  margin:0;
  line-height:.8;
  letter-spacing:-.08em;
}
h1 span{color:#a5161c}
h2{
  font-size:32px;
  font-weight:300;
  margin:28px 0 0;
}
p{
  max-width:620px;
  margin:28px auto 0;
  font-size:18px;
  line-height:1.8;
  color:#cfc5b8;
}
.btn{
  display:inline-block;
  margin-top:36px;
  padding:16px 28px;
  border-radius:50px;
  background:#f3eee4;
  color:#050507;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>
<body>

<section class="hero">
  <div>
    <h1>שג<span>א</span>ון</h1>
    <h2>המרחב החי שבין דיכאון לשגעון</h2>
    <p>
      נקודת מבט אישית על המקום שבו הנפש כבר לא מסתירה הכול.
      לא שיטה. לא קורס. מסע חזותי, רגשי ואנושי בתוך השברים.
    </p>
    <a class="btn" href="#">להיכנס למסע</a>
  </div>
</section>

</body>
</html>
